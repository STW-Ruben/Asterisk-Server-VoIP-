; ============================================================
;  voicemail.conf - Buzon de Voz
;  Todas las extensiones: 1000-1005 / 2000-2005 / 3000-3005
; ============================================================

[general]
format=wav49|gsm|wav               ; Formatos de grabacion
serveremail=pbx@tudominio.com      ; Email remitente
attach=yes                          ; Adjuntar audio al correo
skipms=3000                         ; Salto en ms al escuchar
maxsilence=10                       ; Silencio maximo para cortar
silencethreshold=128
maxlogins=3
emaildateformat=%d/%m/%Y %H:%M     ; Formato de fecha en emails
pagerdateformat=%d/%m %H:%M
sendvoicemail=yes                   ; Permite enviar VM desde el menu
review=yes                          ; Permite revisar antes de guardar
operator=yes                        ; Opcion 0 para operador
envelope=yes                        ; Reproduce info del mensaje primero
sayduration=yes
saydurationm=1
forcegreetings=no
forcename=no
nextaftercmd=yes                    ; Siguiente mensaje automatico
tempgreetwarn=yes
moveheard=yes                       ; Mover mensajes escuchados
charset=UTF-8

; Configuracion de correo electronico para notificaciones
[general](+)
; Plantilla de email para nuevos mensajes
emailbody=Hola,\n\nTienes un nuevo mensaje de voz en tu extension ${VM_EXTEN}.\n\nRemitente: ${VM_CALLERID}\nDuracion: ${VM_DUR} segundos\nFecha: ${VM_DATE}\n\nPor favor revisa tu buzon marcando *98.\n\nSistema de Comunicaciones - PBX Asterisk
emailsubject=Nuevo Mensaje de Voz - Extension ${VM_EXTEN} - De: ${VM_CALLERID}

; ============================================================
