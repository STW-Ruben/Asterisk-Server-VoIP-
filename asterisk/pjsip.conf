[global]
type=global

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; TRANSPORTE SIP
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=CHANGE_ME_PUBLIC_IP_OR_DOMAIN
external_media_address=CHANGE_ME_PUBLIC_IP_OR_DOMAIN
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_signaling_address=CHANGE_ME_PUBLIC_IP_OR_DOMAIN
external_media_address=CHANGE_ME_PUBLIC_IP_OR_DOMAIN
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
external_signaling_address=CHANGE_ME_DOMAIN
external_media_address=CHANGE_ME_DOMAIN
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
cert_file=/etc/letsencrypt/live/CHANGE_ME_DOMAIN/fullchain.pem
priv_key_file=/etc/letsencrypt/live/CHANGE_ME_DOMAIN/privkey.pem
method=tlsv1_2
verify_client=no
verify_server=no
require_client_cert=no

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; PLANTILLAS
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[endpoint-template](!)
type=endpoint
context=internal
disallow=all
; AUDIO
allow=opus
allow=g722
allow=ulaw
allow=alaw
allow=gsm
; VIDEO
allow=vp8
allow=h264
allow=h265
; NAT
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes
; DTMF
dtmf_mode=rfc4733
; MENSAJERIA
accept_multiple_sdp_answers=yes
allow_subscribe=yes
message_context=messages
; PRESENCIA / BUZON
aggregate_mwi=yes
; RTP
rtcp_mux=yes
; IDENTIFICACION
trust_id_inbound=yes
trust_id_outbound=yes
; TRANSFERENCIAS
allow_transfer=yes
; KEEPALIVE
rtp_keepalive=30
; LIMITES
device_state_busy_at=5

[aor-template](!)
type=aor
max_contacts=5
remove_existing=yes
default_expiration=3600

[auth-template](!)
type=auth
auth_type=userpass

