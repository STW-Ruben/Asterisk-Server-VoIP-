; ============================================================
;  cdr.conf - Registro de Detalle de Llamadas (CDR)
; ============================================================

[general]
enable=yes
unanswered=yes                      ; Registra tambien llamadas no contestadas
congestion=yes
batch=no
endbeforehexten=yes
initiatedseconds=no
scheduleronly=no
safeshutdown=yes

[csv]
usegmtime=no
loguniqueid=yes
loguserfield=yes
accountlogs=yes

; ============================================================
;  manager.conf - Interfaz AMI (Asterisk Manager Interface)
;  Usado por paneles web (FreePBX, Asterisk-GUI, etc.)
; ============================================================

[general]
enabled=yes
port=5038
bindaddr=127.0.0.1                  ; Solo local por seguridad
displayconnects=yes
timestampevents=yes
httptimeout=60
authtimeout=30
authlimit=50
channelvars=CDR(accountcode)

; ---- Usuario administrador AMI ----
[admin]
secret=AMI_Admin$ecure2024!
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.0
permit=192.168.0.0/255.255.0.0
read=all
write=all
writetimeout=5000

; ---- Usuario de solo lectura (para monitoreo) ----
[monitor]
secret=Monitor$ecure2024!
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.0
read=all
write=no
