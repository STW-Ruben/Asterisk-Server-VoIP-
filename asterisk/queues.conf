; ============================================================
;  queues.conf - Colas de Llamadas ACD
;  Cola: ventas | soporte | administracion
; ============================================================

[general]
persistmembers=yes                 ; Guarda miembros en la BD entre reinicios
autofill=yes                       ; Distribuye llamadas a todos los agentes disponibles
monitor-type=MixMonitor            ; Tipo de grabacion
shared_lastcall=yes                ; Comparte tiempo de ultima llamada entre colas
log_membername_as_agent=yes

; ============================================================
;  COLA: VENTAS (extensiones 1000-1005)
; ============================================================
[ventas]
musicclass=ventas                   ; Musica en espera personalizada
announce=custom/cola-ventas         ; Anuncio al entrar a la cola
strategy=ringall                    ; Llama a todos a la vez (alternativa: leastrecent)
timeout=25                          ; Segundos antes de pasar al siguiente agente
retry=5                             ; Segundos entre reintentos
weight=0
wrapuptime=10                       ; Tiempo de pausa post-llamada
maxlen=10                           ; Maximo 10 en cola
announce-frequency=60               ; Anuncia posicion cada 60 seg
announce-holdtime=yes               ; Anuncia tiempo de espera estimado
announce-position=yes               ; Anuncia posicion en la cola
announce-position-limit=5           ; Anuncia posicion si es <= 5
min-announce-frequency=15
periodic-announce=custom/seguimos-atendiendo
periodic-announce-frequency=90
joinempty=yes                       ; Permite entrar aunque no haya agentes
leavewhenempty=no
reportholdtime=yes
memberdelay=1
ringinuse=no                        ; No llama a agentes en llamada
; Miembros de la cola
member => PJSIP/1000,0,Ventas Principal,PJSIP/1000
member => PJSIP/1001,1,Agente 1,PJSIP/1001
member => PJSIP/1002,1,Agente 2,PJSIP/1002
member => PJSIP/1003,1,Agente 3,PJSIP/1003
member => PJSIP/1004,2,Agente 4,PJSIP/1004
member => PJSIP/1005,2,Agente 5,PJSIP/1005

; ============================================================
;  COLA: SOPORTE TECNICO (extensiones 2000-2005)
; ============================================================
[soporte]
musicclass=soporte
announce=custom/cola-soporte
strategy=leastrecent                ; Al agente que menos llamadas recibio
timeout=30
retry=5
weight=0
wrapuptime=15
maxlen=15
announce-frequency=60
announce-holdtime=yes
announce-position=yes
announce-position-limit=5
min-announce-frequency=15
periodic-announce=custom/seguimos-atendiendo
periodic-announce-frequency=90
joinempty=yes
leavewhenempty=no
reportholdtime=yes
memberdelay=1
ringinuse=no
member => PJSIP/2000,0,Soporte Principal,PJSIP/2000
member => PJSIP/2001,1,Tecnico 1,PJSIP/2001
member => PJSIP/2002,1,Tecnico 2,PJSIP/2002
member => PJSIP/2003,1,Tecnico 3,PJSIP/2003
member => PJSIP/2004,2,Tecnico 4,PJSIP/2004
member => PJSIP/2005,2,Tecnico 5,PJSIP/2005

; ============================================================
;  COLA: ADMINISTRACION (extensiones 3000-3005)
; ============================================================
[administracion]
musicclass=administracion
announce=custom/cola-admin
strategy=fewestcalls                ; Al agente con menos llamadas totales
timeout=20
retry=5
weight=0
wrapuptime=10
maxlen=8
announce-frequency=60
announce-holdtime=yes
announce-position=yes
announce-position-limit=3
min-announce-frequency=15
periodic-announce=custom/seguimos-atendiendo
periodic-announce-frequency=90
joinempty=yes
leavewhenempty=no
reportholdtime=yes
memberdelay=1
ringinuse=no
