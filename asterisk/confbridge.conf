; ============================================================
;  confbridge.conf - Salas de Conferencia con Video
; ============================================================

[general]
; Nada que configurar aqui globalmente

; ---- PERFIL DE BRIDGE (sala) ----
[default_bridge]
type=bridge
max_members=20                      ; Maximo 20 participantes
record_conference=no                ; Cambiar a yes para grabar
record_file=/var/spool/asterisk/monitor/conf_${CONFBRIDGE(name)}_${STRFTIME(${EPOCH},,%%Y%%m%%d_%%H%%M%%S)}.wav
video_mode=follow_talker            ; Video del que habla (alternativas: first_marked, last_marked)
;video_mode=sfu                     ; SFU para multiples streams simultaneos
internal_sample_rate=auto
mixing_interval=20
sound_join=confbridge-join
sound_leave=confbridge-leave
sound_has_joined=confbridge-hasjoin
sound_has_left=confbridge-hasleft
sound_kicked=confbridge-kicked
sound_muted=confbridge-muted
sound_unmuted=confbridge-unmuted
sound_only_person=confbridge-onlyperson
sound_only_one=confbridge-onlyone
sound_there_are=confbridge-thereare
sound_other_in_party=confbridge-otherinparty
sound_begin=confbridge-begin
sound_wait_for_leader=confbridge-waitforleader
sound_leader_has_left=confbridge-leaderhasleft
sound_get_pin=confbridge-pin
sound_invalid_pin=confbridge-invalidpin
sound_locked=confbridge-locked
sound_locked_now=confbridge-lockednow
sound_unlocked_now=confbridge-unlockednow
sound_error_menu=confbridge-errormenu

; ---- PERFIL DE USUARIO NORMAL ----
[default_user]
type=user
announce_join_leave=yes
announce_user_count=yes
announce_user_count_all=yes
music_on_hold_when_empty=yes
music_on_hold_class=default
announce_only_user=yes
wait_marked=no
end_marked=no
talk_detection_events=yes
dtmf_passthrough=no
; Menu DTMF para usuarios
menu=default_menu

; ---- PERFIL DE USUARIO ADMINISTRADOR ----
[admin_user]
type=user
admin=yes                           ; Es administrador de la conferencia
marked=yes                          ; Su entrada/salida controla el inicio/fin
announce_join_leave=yes
announce_user_count=yes
announce_only_user=yes
music_on_hold_when_empty=yes
music_on_hold_class=default
talk_detection_events=yes
dtmf_passthrough=no
menu=admin_menu

; ---- MENU DTMF USUARIO ----
[default_menu]
type=menu
; *1: Silenciar/Des-silenciar
DTMF_*1=toggle_mute
; *2: Bloquear/desbloquear sala
DTMF_*2=no_op
; *3: Aumentar volumen
DTMF_*3=increase_listening_volume
; *4: Disminuir volumen
DTMF_*4=decrease_listening_volume
; *5: Repetir conteo de usuarios
DTMF_*5=participant_count
; #: Salir de la conferencia
DTMF_#=leave_conference

; ---- MENU DTMF ADMINISTRADOR ----
[admin_menu]
type=menu
DTMF_*1=toggle_mute
DTMF_*2=admin_toggle_conference_lock
DTMF_*3=increase_listening_volume
DTMF_*4=decrease_listening_volume
DTMF_*5=participant_count
DTMF_*6=admin_kick_last
DTMF_*7=admin_toggle_mute_participants
DTMF_#=leave_conference
