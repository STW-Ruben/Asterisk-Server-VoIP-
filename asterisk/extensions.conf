; ============================================================
;  extensions.conf - Dialplan Completo
;  Voz | Video | Mensajes de Texto | Buzon | Colas | IVR
; ============================================================

[globals]
EXTENSION_TIMEOUT=30               ; Segundos antes de desviar al buzon
QUEUE_TIMEOUT=60                   ; Segundos en cola antes de timeout
PARKING_LOT=default
LOG_DIR=/var/log/asterisk/calls

; ============================================================
;  CONTEXTO DEFAULT (entrante general / acceso inicial)
; ============================================================
[default]
; Captura llamadas sin contexto definido y redirige al IVR
exten => s,1,Goto(ivr-main,s,1)
exten => i,1,Hangup()
exten => t,1,Hangup()

; ============================================================
;  CONTEXTO INTERNAL - Extensiones registradas
; ============================================================
[internal]
; ---- Llamadas directas entre extensiones (voz y video) ----

; Grupo 1000 (1000-1005)
exten => _100[0-5],1,NoOp(Llamada interna a ${EXTEN})
 same => n,Set(CALLERID(name)=${CALLERID(name)})
 same => n,Set(CDR(description)=Llamada interna)
 same => n,Dial(PJSIP/${EXTEN},${EXTENSION_TIMEOUT},tTkKb(default^entrada-musica^1))
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?nocontesta)
 same => n,Hangup()
 same => n(ocupado),VoiceMail(${EXTEN}@default,bu)
 same => n,Hangup()
 same => n(nocontesta),VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Grupo 2000 (2000-2005)
exten => _200[0-5],1,NoOp(Llamada interna a ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},${EXTENSION_TIMEOUT},tTkKb(default^entrada-musica^1))
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?nocontesta)
 same => n,Hangup()
 same => n(ocupado),VoiceMail(${EXTEN}@default,bu)
 same => n,Hangup()
 same => n(nocontesta),VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Grupo 3000 (3000-3005)
exten => _300[0-5],1,NoOp(Llamada interna a ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},${EXTENSION_TIMEOUT},tTkKb(default^entrada-musica^1))
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?nocontesta)
 same => n,Hangup()
 same => n(ocupado),VoiceMail(${EXTEN}@default,bu)
 same => n,Hangup()
 same => n(nocontesta),VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; ---- Acceso a Buzon de voz ----
exten => *98,1,NoOp(Acceso al Buzon de Voz)
 same => n,Answer()
 same => n,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; Buzon de extension especifica: *98 + numero
exten => _*98.,1,NoOp(Buzon de voz ${EXTEN:3})
 same => n,Answer()
 same => n,VoiceMailMain(${EXTEN:3}@default)
 same => n,Hangup()

; ---- Captura de llamada (pickup) ----
exten => *8,1,Pickup()
exten => _*8.,1,Pickup(${EXTEN:2}@internal)

; ---- Estacionar llamada (park) ----
exten => 700,1,NoOp(Estacionar llamada)
 same => n,Park()

; Recuperar llamada estacionada (701-720)
exten => _70[1-9],1,ParkedCall(${EXTEN})
exten => _71[0-9],1,ParkedCall(${EXTEN})
exten => _720,1,ParkedCall(${EXTEN})

; ---- IVR / Recepcionista virtual ----
exten => 900,1,Goto(ivr-main,s,1)

; ---- Colas de llamadas ----
exten => 8001,1,NoOp(Cola Ventas)
 same => n,Answer()
 same => n,Queue(ventas,tTkK,,${QUEUE_TIMEOUT})
 same => n,VoiceMail(1000@default,u)
 same => n,Hangup()

exten => 8002,1,NoOp(Cola Soporte)
 same => n,Answer()
 same => n,Queue(soporte,tTkK,,${QUEUE_TIMEOUT})
 same => n,VoiceMail(2000@default,u)
 same => n,Hangup()

exten => 8003,1,NoOp(Cola Administracion)
 same => n,Answer()
 same => n,Queue(administracion,tTkK,,${QUEUE_TIMEOUT})
 same => n,VoiceMail(3000@default,u)
 same => n,Hangup()

; ---- Conferencia ----
exten => 500,1,NoOp(Sala de Conferencia 500)
 same => n,Answer()
 same => n,ConfBridge(1,default_bridge,default_user)
 same => n,Hangup()

exten => 501,1,NoOp(Sala de Conferencia 501 - Admin)
 same => n,Answer()
 same => n,ConfBridge(2,default_bridge,admin_user)
 same => n,Hangup()

; ---- Echo test (prueba de audio) ----
exten => 9999,1,NoOp(Echo Test)
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; ---- Hora actual ----
exten => 9998,1,Answer()
 same => n,SayUnixTime(,America/Santo_Domingo,kMp)
 same => n,Hangup()

; Captura de extensiones no definidas
exten => i,1,NoOp(Extension invalida: ${EXTEN})
 same => n,Playback(pbx-invalid)
 same => n,Hangup()

exten => t,1,Hangup()
exten => h,1,NoOp(Llamada finalizada: ${DIALSTATUS})

; ============================================================
;  CONTEXTO MENSAJES DE TEXTO (SIP MESSAGE)
; ============================================================
[messages]
exten => _.,1,NoOp(Mensaje de texto recibido de ${MESSAGE(from)} para ${EXTEN})
 same => n,Set(MSG_BODY=${MESSAGE(body)})
 same => n,Set(MSG_FROM=${MESSAGE(from)})
 same => n,Set(MSG_TO=${EXTEN})
 same => n,Set(DOMAIN=chivoisland.duckdns.org)
 same => n,NoOp(Mensaje: ${MSG_BODY})
 same => n,MessageSend(pjsip:${MSG_TO}@${DOMAIN},${MSG_FROM})
 same => n,Hangup()

; ============================================================
;  IVR PRINCIPAL
; ============================================================
[ivr-main]
exten => s,1,NoOp(IVR Principal iniciado)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/bienvenida)          ; Graba tu propio mensaje
 ; Fallback si no existe el audio personalizado:
 ; same => n,Playback(tt-weasels)
 same => n(menu),Background(custom/menu-principal)
 same => n,WaitExten(5)

; Opciones del menu
exten => 1,1,NoOp(IVR -> Ventas)
 same => n,Playback(custom/transfiriendo-ventas)
 same => n,Goto(internal,8001,1)

exten => 2,1,NoOp(IVR -> Soporte)
 same => n,Playback(custom/transfiriendo-soporte)
 same => n,Goto(internal,8002,1)

exten => 3,1,NoOp(IVR -> Administracion)
 same => n,Playback(custom/transfiriendo-admin)
 same => n,Goto(internal,8003,1)

exten => 0,1,NoOp(IVR -> Operadora)
 same => n,Dial(PJSIP/1000,20)
 same => n,Goto(ivr-main,s,menu)

exten => *,1,Goto(ivr-main,s,menu)     ; Repetir menu
exten => #,1,Hangup()                  ; Colgar

exten => i,1,NoOp(Opcion invalida en IVR)
 same => n,Playback(pbx-invalid)
 same => n,Goto(ivr-main,s,menu)

exten => t,1,NoOp(Timeout en IVR)
 same => n,Goto(ivr-main,s,menu)

; ============================================================
;  MUSICA EN ESPERA (contexto de musica mientras suena)
; ============================================================
[entrada-musica]
exten => s,1,MusicOnHold()

; ============================================================
;  CONFERENCIAS (ConfBridge)
; ============================================================
[confbridge-menu]
exten => *,1,ConfBridge(${CONFBRIDGE(name)},default_bridge,admin_user)
 same => n,Hangup()

; ============================================================
;  ESTACIONAMIENTO
; ============================================================
[parkedcalls]
; Configurado en features.conf

; ============================================================
;  SALIENTES (si tienes troncal SIP hacia PSTN)
; ============================================================
[outbound-pstn]
; Patron para llamadas nacionales (Republica Dominicana: 10 digitos)
exten => _XXXXXXXXXX,1,NoOp(Llamada saliente a ${EXTEN})
 same => n,Set(CALLERID(num)=107.170.37.39)
 same => n,Dial(PJSIP/${EXTEN}@trunk-pstn,60,tTkK)
 same => n,Hangup()

; Internacional
exten => _011.,1,NoOp(Llamada internacional a ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@trunk-pstn,120,tTkK)
 same => n,Hangup()
