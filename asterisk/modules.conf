; ============================================================
;  modules.conf - Control de Modulos
;  Deshabilita chan_sip (deprecado) y asegura carga de PJSIP
; ============================================================

[modules]
autoload=yes

; ---- IMPORTANTE: Desactivar chan_sip para evitar conflicto de puertos ----
noload => chan_sip.so

; ---- Asegurar buzon de voz correcto (no IMAP) ----
noload => app_voicemail_imap.so
load => app_voicemail.so

; ---- Cargar explicitamente los modulos PJSIP necesarios ----
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_outbound_registration.so
load => res_pjsip_registrar.so
load => res_pjsip_transport_websocket.so
load => res_pjsip_diversion.so
load => res_pjsip_messaging.so
load => res_pjsip_pubsub.so
load => res_pjsip_mwi.so
load => res_pjsip_t38.so
load => chan_pjsip.so

; ---- SRTP (cifrado de medios) ----
load => res_srtp.so

; ---- Mensajes ----
load => res_xmpp.so
noload => res_xmpp.so   ; deshabilitado por defecto, activar si usas XMPP

; ---- ConfBridge (conferencias con video) ----
load => app_confbridge.so

; ---- Colas ----
load => app_queue.so
