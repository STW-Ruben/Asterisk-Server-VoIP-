; ============================================================
;  jail.d/asterisk.conf
;  Bloquea IPs que intentan fuerza bruta contra PJSIP
;  IMPORTANTE: usa backend=polling porque Asterisk no escribe
;  estos logs al journal de systemd por defecto.
; ============================================================

[asterisk]
enabled  = true
filter   = asterisk
port     = 0:65535
protocol = all
logpath  = /var/log/asterisk/full
backend  = polling
maxretry = 3
findtime = 300
bantime  = 86400
action   = iptables-allports[name=asterisk, chain=INPUT, protocol=udp]
           iptables-allports[name=asterisk-tcp, chain=INPUT, protocol=tcp]
